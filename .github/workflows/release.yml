name: Build and Release Latest

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史以便清理

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Static Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o sni-proxy main.go

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sni-proxy
            config.jsonc
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Old Releases and Tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          echo "Scanning for old releases to delete (excluding $CURRENT_TAG)..."
          
          # 获取所有 release 并排除当前正在操作的 tag
          # gh release list 的输出格式为: Title | Latest/Pre-release | Tag | Date
          OLD_TAGS=$(gh release list --limit 100 | awk -v cur="$CURRENT_TAG" '$3 != cur && $3 != "" {print $3}')
          
          for tag in $OLD_TAGS; do
            echo "Deleting old release and tag: $tag"
            gh release delete "$tag" -y --cleanup-tag
          done
          
          echo "Cleanup complete. Current release: $CURRENT_TAG is now the only release."
