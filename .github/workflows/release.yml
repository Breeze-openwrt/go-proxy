name: Build and Release Latest

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Fully Static Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w -extldflags '-static'" -o sni-proxy main.go
          ls -lh sni-proxy

      - name: Create or Update Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Build' }}
          make_latest: true
          files: |
            sni-proxy
            config.jsonc
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforcement - Keep Only One Release
        if: ${{ always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          echo "Enforcing single release policy (Current: $CURRENT_TAG)..."
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
          for tag in $RELEASES; do
            if [ "$tag" != "$CURRENT_TAG" ] && [ "$tag" != "latest" ]; then
              echo "Cleaning up redundant release and tag: $tag"
              gh release delete "$tag" -y --cleanup-tag || true
            fi
          done
          echo "Repository is now clean."
