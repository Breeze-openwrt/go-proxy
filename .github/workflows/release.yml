name: Build and Release Latest

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # 启用手动触发按钮

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Static Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -ldflags="-s -w" -o sni-proxy main.go

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Build' }}
          make_latest: true
          files: |
            sni-proxy
            config.jsonc
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Old Releases and Tags
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          echo "Scanning for old releases to delete (excluding $CURRENT_TAG)..."
          # 使用 JSON 格式安全提取所有 Tag 名，并排除当前正在发布的 Tag
          OLD_TAGS=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | grep -v "^$CURRENT_TAG$" || true)
          
          if [ -n "$OLD_TAGS" ]; then
            for tag in $OLD_TAGS; do
              echo "Deleting old release and tag: $tag"
              gh release delete "$tag" -y --cleanup-tag || true
            done
          else
            echo "No old releases found to clean up."
          fi
          echo "Cleanup complete."
