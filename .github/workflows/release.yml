name: Build and Release Latest

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Fully Static Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build -trimpath -ldflags="-s -w -extldflags '-static'" -o sni-proxy main.go
          ls -lh sni-proxy

      - name: Create or Update Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Build' }}
          make_latest: true
          files: |
            sni-proxy
            config.jsonc
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforcement - Keep Only One Release
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          echo "Enforcing single release policy (Current: $CURRENT_TAG)..."
          
          # 针对 main 分支推送，当前有效 Tag 视为 'latest'
          [ "$CURRENT_TAG" = "main" ] && CURRENT_TAG="latest"
          
          # 修正：增加 -r 参数以获取原始字符串（移除双引号）
          RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName' | sed 's/\"//g')
          
          # 另一种更稳健的获取方式
          for tag in $RELEASES; do
            if [ -z "$tag" ]; then continue; fi
            if [ "$tag" != "$CURRENT_TAG" ]; then
              echo "Deleting redundant release and tag: $tag"
              gh release delete "$tag" -y --cleanup-tag || true
            fi
          done
          
          # 额外清场：如果存在一些没有 Release 的孤儿 Tag（v*），也尝试清理
          if [ "$CURRENT_TAG" = "latest" ]; then
             echo "Cleaning up orphan v* tags..."
             git tag -l "v*" | grep -v "^$CURRENT_TAG$" | xargs -n 1 -I {} sh -c 'gh release delete {} -y --cleanup-tag || true'
          fi
          
          echo "Repository cleanup complete."
